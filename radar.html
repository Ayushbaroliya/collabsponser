<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar UI - Antigravity Premium Design</title>
    <link rel="stylesheet" href="radar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="radar-wrapper">
            <!-- Radar Component -->
            <div id="radar" class="radar">
                <!-- Sweep line -->
                <div class="sweep-line"></div>
                
                <!-- Circles will be generated by JS or hardcoded -->
                <div id="circles-container"></div>
            </div>

            <!-- Icons overlaying the radar -->
            <div id="icons-container" class="icons-container">
                <!-- Icons will be generated by JS -->
            </div>
        </div>
    </div>
    <script src="radar.js"></script>
</body>
</html>
